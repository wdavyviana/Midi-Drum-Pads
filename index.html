<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI DRUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/bateria.png">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<h1>Midi Drum Pad</h1>
<section class="teclado">
<button class="tecla tecla_pom" data-instrumento="pom" data-key="KeyQ" aria-label="Som pom (tecla Q)"></button>
<button class="tecla tecla_clap" data-instrumento="clap" data-key="KeyW" aria-label="Som clap (tecla W)"></button>
<button class="tecla tecla_tim" data-instrumento="tim" data-key="KeyE" aria-label="Som tim (tecla E)"></button>
<button class="tecla tecla_puff" data-instrumento="puff" data-key="KeyA" aria-label="Som puff (tecla A)"></button>
<button class="tecla tecla_splash" data-instrumento="splash" data-key="KeyS" aria-label="Som splash (tecla S)"></button>
<button class="tecla tecla_toim" data-instrumento="toim" data-key="KeyD" aria-label="Som toim (tecla D)"></button>
<button class="tecla tecla_psh" data-instrumento="psh" data-key="KeyZ" aria-label="Som psh (tecla Z)"></button>
<button class="tecla tecla_tic" data-instrumento="tic" data-key="KeyX" aria-label="Som tic (tecla X)"></button>
<button class="tecla tecla_tom" data-instrumento="tom" data-key="KeyC" aria-label="Som tom (tecla C)"></button>
</section>
<audio src="sounds/keyq.wav" id="som_pom"></audio>
<audio src="sounds/keyw.wav" id="som_clap"></audio>
<audio src="sounds/keye.wav" id="som_tim"></audio>
<audio src="sounds/keya.wav" id="som_puff"></audio>
<audio src="sounds/keys.wav" id="som_splash"></audio>
<audio src="sounds/keyd.wav" id="som_toim"></audio>
<audio src="sounds/keyz.wav" id="som_psh"></audio>
<audio src="sounds/keyx.wav" id="som_tic"></audio>
<audio src="sounds/keyc.wav" id="som_tom"></audio>
<script src="main.js"></script>
</body>
</html>
